<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privat Madplanlægger</title>
<style>
body { font-family: Arial, sans-serif; margin:0; background:#f5f5f5; }
header { background:#4CAF50; color:#fff; padding:1rem; text-align:center; }
nav { display:flex; flex-wrap:wrap; background:#eee; }
nav button { flex:1; padding:0.8rem; border:none; background:#eee; font-size:1rem; }
nav button:hover { background:#ddd; cursor:pointer; }
section { padding:1rem; display:none; }
section.active { display:block; }
.card { background:#fff; padding:0.8rem; margin-bottom:0.7rem; border-radius:6px; }
input, textarea, select, button { width:100%; padding:0.5rem; margin:0.2rem 0; }
.shopping-item { display:flex; align-items:center; gap:0.6rem; }
.shopping-item.checked { text-decoration: line-through; opacity:0.6; }
.group-title { font-weight:bold; margin-top:1rem; }
.favorite { color:gold; cursor:pointer; font-size:1.2em; }
</style>
</head>
<body>
<header><h1>Privat Madplanlægger</h1></header>
<nav>
<button onclick="show('planner')">Ugeplan</button>
<button onclick="show('recipes')">Opskrifter</button>
<button onclick="show('shopping')">Indkøbsliste</button>
</nav>

<section id="planner" class="active">
<h2>Ugeplan</h2>
<select id="week"></select>
<div id="days"></div>
</section>

<section id="recipes">
<h2>Opskrifter</h2>
<input id="rName" placeholder="Navn">
<select id="rCat">
<option>Kød</option>
<option>Grønt & frugt</option>
<option>Kolonial</option>
<option>Fisk</option>
<option>Andet</option>
</select>
<textarea id="rIng" placeholder="Ingredienser (én pr. linje)"></textarea>
<input id="rLink" placeholder="Link (valgfri)">
<button onclick="addRecipe()">Gem opskrift</button>
<div id="recipeList"></div>
</section>

<section id="shopping">
<h2>Indkøbsliste for ugen</h2>
<button onclick="clearShopping()">Ryd indkøbslisten</button>
<div id="shoppingList"></div>
</section>

<script>
const days=['Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag','Søndag'];
let recipes=JSON.parse(localStorage.getItem('recipes')||'[]');
let plans=JSON.parse(localStorage.getItem('plans')||'{}');
let checkedItems=JSON.parse(localStorage.getItem('checkedItems')||'{}');

function show(id){document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');if(id==='shopping') buildShopping();}

function initWeeks(){const w=document.getElementById('week');for(let i=1;i<=52;i++){let o=document.createElement('option');o.value='Uge '+i;o.textContent='Uge '+i;w.appendChild(o);}w.onchange=renderDays;renderDays();}

function renderDays(){const c=document.getElementById('days');const w=document.getElementById('week').value;if(!plans[w]) plans[w]={};c.innerHTML='';days.forEach(d=>{let div=document.createElement('div');div.className='card';let inp=document.createElement('input');inp.placeholder=d;inp.value=plans[w][d]||'';inp.oninput=()=>{plans[w][d]=inp.value;localStorage.setItem('plans',JSON.stringify(plans));};let dl=document.createElement('datalist');dl.id='dl'+d;recipes.sort((a,b)=>b.favorite-a.favorite).forEach(r=>{let o=document.createElement('option');o.value=r.name;dl.appendChild(o);});inp.setAttribute('list',dl.id);div.appendChild(inp);div.appendChild(dl);c.appendChild(div);});}

function addRecipe(){const n=rName.value.trim();if(!n) return;recipes.push({name:n,cat:rCat.value,ing:rIng.value.split('
'),link:rLink.value,favorite:false});localStorage.setItem('recipes',JSON.stringify(recipes));rName.value='';rIng.value='';rLink.value='';renderRecipes();}

function toggleFavorite(i){recipes[i].favorite=!recipes[i].favorite;localStorage.setItem('recipes',JSON.stringify(recipes));renderRecipes();}

function renderRecipes(){const l=document.getElementById('recipeList');l.innerHTML='';recipes.forEach((r,i)=>{let d=document.createElement('div');d.className='card';d.innerHTML=`<span class="favorite" onclick="toggleFavorite(${i})">${r.favorite?'★':'☆'}</span> <strong>${r.name}</strong> (${r.cat})<br>${r.ing.join('<br>')}${r.link?'<br><a href="'+r.link+'" target="_blank">Link</a>':''}`;let b=document.createElement('button');b.textContent='Slet';b.onclick=()=>{recipes.splice(i,1);localStorage.setItem('recipes',JSON.stringify(recipes));renderRecipes();};d.appendChild(b);l.appendChild(d);});}

function groupFor(item){item=item.toLowerCase();if(item.includes('okse')||item.includes('kylling')||item.includes('svin')) return 'Kød';if(item.includes('mælk')||item.includes('ost')||item.includes('smør')||item.includes('grønt')||item.includes('salat')||item.includes('frugt')) return 'Grønt & frugt';return 'Kolonial';}

function buildShopping(){const w=document.getElementById('week').value;let groups={};if(!plans[w]) return;Object.values(plans[w]).forEach(name=>{const r=recipes.find(x=>x.name===name);if(r) r.ing.forEach(i=>{let g=groupFor(i);groups[g]=groups[g]||[];groups[g].push(i);});});const l=document.getElementById('shoppingList');l.innerHTML='';Object.keys(groups).forEach(g=>{let t=document.createElement('div');t.className='group-title';t.textContent=g;l.appendChild(t);[...new Set(groups[g])].forEach(i=>{let key=w+'_'+i;let d=document.createElement('div');d.className='card shopping-item'+(checkedItems[key]?' checked':'');let cb=document.createElement('input');cb.type='checkbox';cb.checked=!!checkedItems[key];cb.onchange=()=>{checkedItems[key]=cb.checked;localStorage.setItem('checkedItems',JSON.stringify(checkedItems));d.classList.toggle('checked',cb.checked);};let s=document.createElement('span');s.textContent=i;d.appendChild(cb);d.appendChild(s);l.appendChild(d);});});}

function clearShopping(){checkedItems={};localStorage.removeItem('checkedItems');buildShopping();}

initWeeks();renderRecipes();
</script>
</body>
</html>
